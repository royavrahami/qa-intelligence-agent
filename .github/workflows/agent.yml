name: QA Intelligence Agent

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   - Schedule:  collection 2× daily (06:00 + 18:00 UTC)
#                daily digest every day at 22:00 UTC (midnight Israel time)
#   - Manual:    GitHub Actions → "Run workflow" button
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 6,18 * * *"    # Collection agent: 06:00 and 18:00 UTC
    - cron: "0 22 * * *"      # Daily digest: 22:00 UTC (midnight Israel)
  workflow_dispatch:
    inputs:
      job_type:
        description: "Job to run: 'collect' or 'digest'"
        required: false
        default: "collect"
        type: choice
        options: [collect, digest]
      min_relevance_score:
        description: "Minimum relevance score (0–100)"
        required: false
        default: "40"
      openai_model:
        description: "OpenAI model"
        required: false
        default: "gpt-4o"
        type: choice
        options: [gpt-4o, gpt-4o-mini]

permissions:
  contents: write   # required to commit reports back to the repo

concurrency:
  group: qa-agent
  cancel-in-progress: false   # always let the current run finish

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – Collection Agent (2× daily + manual 'collect')
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  run-agent:
    name: Run QA Intelligence Agent
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type != 'digest') ||
      (github.event_name == 'schedule' && github.event.schedule != '0 22 * * *')

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      # ── 3. Dependencies ─────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt --quiet

      # ── 4. Restore database from previous run ───────────────────────────────
      - name: Restore agent database from previous run
        uses: dawidd6/action-download-artifact@v6
        with:
          name: qa-agent-database
          path: data/
          workflow_conclusion: success
          if_no_artifact_found: ignore
        continue-on-error: true

      # ── 5. Configure environment ────────────────────────────────────────────
      - name: Create .env configuration
        run: |
          cat > .env << 'ENVEOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ github.event.inputs.openai_model || 'gpt-4o' }}
          OPENAI_MAX_TOKENS=2000
          DATABASE_URL=sqlite:///./data/qa_agent.db
          MIN_RELEVANCE_SCORE=${{ github.event.inputs.min_relevance_score || '40' }}
          SCHEDULE_INTERVAL_HOURS=6
          REPORTS_DIR=./reports
          LOG_LEVEL=INFO
          LOG_DIR=./logs
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}
          ENVEOF

      # ── 6. Directories ──────────────────────────────────────────────────────
      - name: Create required directories
        run: mkdir -p data reports logs

      # ── 7. Run the agent ────────────────────────────────────────────────────
      - name: Run QA Intelligence Agent
        run: PYTHONPATH=. python3 main.py run
        env:
          PYTHONUNBUFFERED: "1"

      # ── 8. Upload report artifact ────────────────────────────────────────────
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-intelligence-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      # ── 9. Persist database for next run ─────────────────────────────────────
      - name: Save database for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-agent-database
          path: data/qa_agent.db
          retention-days: 90
          overwrite: true

      # ── 10. Commit latest report back to repo ────────────────────────────────
      - name: Commit latest report to repository
        if: success()
        run: |
          REPORT=$(ls -t reports/*.html 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "No report generated – skipping commit"
            exit 0
          fi

          git config user.name  "QA Intelligence Agent"
          git config user.email "qa-agent@github-actions"
          git add "$REPORT" "${REPORT%.html}.md" 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Report already committed – skipping"
          else
            TIMESTAMP=$(date -u +"%d %b %Y %H:%M UTC")
            git commit -m "report(auto): QA Intelligence Report – $TIMESTAMP [skip ci]"
            git push origin HEAD:main
          fi

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 – Daily Digest Agent (22:00 UTC every day + manual 'digest')
# ─────────────────────────────────────────────────────────────────────────────
  daily-digest:
    name: Daily Digest – End of Day Summary
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'digest') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 22 * * *')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Restore database from latest collection run
        uses: dawidd6/action-download-artifact@v6
        with:
          name: qa-agent-database
          path: data/
          workflow_conclusion: success
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Create .env configuration
        run: |
          cat > .env << 'ENVEOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=gpt-4o
          OPENAI_MAX_TOKENS=2000
          DATABASE_URL=sqlite:///./data/qa_agent.db
          MIN_RELEVANCE_SCORE=30
          REPORTS_DIR=./reports
          LOG_LEVEL=INFO
          LOG_DIR=./logs
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}
          ENVEOF

      - name: Create required directories
        run: mkdir -p data reports logs

      - name: Run Daily Digest Agent
        run: PYTHONPATH=. python3 main.py digest --hours 24 --min-score 30
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload daily digest artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-digest-${{ github.run_number }}
          path: reports/daily_digest_*.html
          retention-days: 60

      - name: Commit daily digest to repository
        if: success()
        run: |
          DIGEST=$(ls -t reports/daily_digest_*.html 2>/dev/null | head -1)
          if [ -z "$DIGEST" ]; then
            echo "No digest generated – skipping commit"
            exit 0
          fi

          git config user.name  "QA Intelligence Agent"
          git config user.email "qa-agent@github-actions"
          git add "$DIGEST" "${DIGEST%.html}.md" 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Already committed – skipping"
          else
            DATE=$(date -u +"%d %b %Y")
            git commit -m "digest(auto): Daily Digest – $DATE [skip ci]"
            git push origin HEAD:main
          fi
